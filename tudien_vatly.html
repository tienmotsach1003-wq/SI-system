<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Từ Điển Vật Lý</title>
<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#00c6ff,#ff9acb);
    text-align:center;
    padding:30px;
}
.container{
    background:white;
    padding:20px;
    border-radius:15px;
    width:400px;
    margin:auto;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
input,button{
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:1px solid #ccc;
}
button{
    background:#00c6ff;
    color:white;
    border:none;
    cursor:pointer;
}
button:hover{
    background:#0099cc;
}
.item{
    background:#ffe6f2;
    margin:5px;
    padding:5px;
    border-radius:8px;
}
</style>
</head>
<body>

<div class="container">
<h2>Từ Điển Vật Lý</h2>

<input id="word" placeholder="Nhập từ">
<input id="meaning" placeholder="Nhập nghĩa">
<br>
<button onclick="saveWord()">Lưu</button>

<div id="list"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
import { getDatabase, ref, set, get, remove } 
from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC1eUCFcMx9k5LWKOJQU3w9z8LszNve8-8",
  authDomain: "thuvienvatly-40081.firebaseapp.com",
  databaseURL: "https://thuvienvatly-40081-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "thuvienvatly-40081",
  storageBucket: "thuvienvatly-40081.firebasestorage.app",
  messagingSenderId: "876358967500",
  appId: "1:876358967500:web:209b7c8c2e130051996269"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

function normalize(text){
    return text.toLowerCase().trim();
}

window.searchTerm = async function(){
    let term = normalize(document.getElementById("searchInput").value);
    let snapshot = await get(ref(db,"dictionary/"+term));
    
    if(snapshot.exists()){
        let data = snapshot.val();
        document.getElementById("result").innerHTML =
            "<h3>"+term.toUpperCase()+"</h3>"+
            "<p><b>Định nghĩa:</b> "+data.meaning+"</p>"+
            "<p><b>Công thức:</b> "+data.formula+"</p>";
    }else{
        document.getElementById("result").innerHTML =
            "Không tìm thấy.";
    }
}

window.addTerm = async function(){
    let term = normalize(document.getElementById("newTerm").value);
    let meaning = document.getElementById("newMeaning").value;
    let formula = document.getElementById("newFormula").value;

    await set(ref(db,"dictionary/"+term),{
        meaning:meaning,
        formula:formula
    });

    alert("Đã lưu online!");
}

window.deleteTerm = async function(){
    let term = normalize(document.getElementById("deleteTerm").value);
    await remove(ref(db,"dictionary/"+term));
    alert("Đã xoá online!");
}

</script>

</body>
</html>
