<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Từ Điển Vật Lý</title>
<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#00c6ff,#ff9acb);
    text-align:center;
    padding:30px;
}
.container{
    background:white;
    padding:20px;
    border-radius:15px;
    width:400px;
    margin:auto;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
input,button{
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:1px solid #ccc;
}
button{
    background:#00c6ff;
    color:white;
    border:none;
    cursor:pointer;
}
button:hover{
    background:#0099cc;
}
.item{
    background:#ffe6f2;
    margin:5px;
    padding:5px;
    border-radius:8px;
}
</style>
</head>
<body>

<div class="container">
<h2>Từ Điển Vật Lý</h2>

<input id="word" placeholder="Nhập từ">
<input id="meaning" placeholder="Nhập nghĩa">
<br>
<button onclick="saveWord()">Lưu</button>

<div id="list"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

const firebaseConfig = {
  apiKey : "AIzaSyC1eUCFcMx9k5LWKOJQU3w9z8LszNve8-8" , 
  authDomain : "thuvienvatly-40081.firebaseapp.com" , 
  databaseURL : "https://thuvienvatly-40081-default-rtdb.asia-southeast1.firebasedatabase.app" , 
  projectId : "thuvienvatly-40081" , 
  storageBucket : "thuvienvatly-40081.firebasestorage.app" , 
  messagingSenderId : "876358967500" , 
  appId : "1:876358967500:web:209b7c8c2e130051996269" , 
  measurementId : "G-1RLVFL4Q71" 
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);
const wordsRef = ref(database, "tudien");

window.saveWord = function(){
    const word = document.getElementById("word").value;
    const meaning = document.getElementById("meaning").value;
    if(word && meaning){
        push(wordsRef,{
            word:word,
            meaning:meaning
        });
        document.getElementById("word").value="";
        document.getElementById("meaning").value="";
    }
};

onValue(wordsRef,(snapshot)=>{
    const data = snapshot.val();
    const list = document.getElementById("list");
    list.innerHTML="";
    for(let id in data){
        list.innerHTML += `<div class="item"><b>${data[id].word}</b>: ${data[id].meaning}</div>`;
    }
});

</script>

</body>
</html>
